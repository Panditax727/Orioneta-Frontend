name: Build and deploy frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: orioneta-frontend
  CONTAINER_NAME: orioneta-public-frontend
  CADDY_CONTAINER_NAME: orioneta-public-caddy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=
            VITE_REALTIME_BASE_URL=

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Allow this runner through SSH
        id: runner-ip
        run: |
          set -euo pipefail
          runner_ip="$(curl --fail --silent --show-error https://checkip.amazonaws.com | tr -d '[:space:]')"
          echo "cidr=${runner_ip}/32" >> "${GITHUB_OUTPUT}"

          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port "${{ secrets.EC2_PORT }}" \
            --cidr "${runner_ip}/32"

      - name: Upload Caddy configuration
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: deploy/Caddyfile
          target: /tmp/orioneta-deploy

      - name: Deploy containers on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -eu

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
            BACKEND_UPSTREAM="${{ secrets.BACKEND_UPSTREAM }}"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker pull "$IMAGE"
            sudo docker network create orioneta-public || true

            sudo mkdir -p /opt/orioneta/caddy-data /opt/orioneta/caddy-config
            sudo install -m 644 /tmp/orioneta-deploy/deploy/Caddyfile /opt/orioneta/Caddyfile

            sudo docker rm -f "${{ env.CONTAINER_NAME }}" || true
            sudo docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              --network orioneta-public \
              "$IMAGE"

            sudo docker rm -f "${{ env.CADDY_CONTAINER_NAME }}" || true
            sudo docker run -d \
              --name "${{ env.CADDY_CONTAINER_NAME }}" \
              --restart unless-stopped \
              --network orioneta-public \
              --add-host host.docker.internal:host-gateway \
              -p 80:80 \
              -p 443:443 \
              -p 443:443/udp \
              -e BACKEND_UPSTREAM="$BACKEND_UPSTREAM" \
              -e ORIONETA_DOMAIN=orioneta.accesscam.org \
              -v /opt/orioneta/Caddyfile:/etc/caddy/Caddyfile:ro \
              -v /opt/orioneta/caddy-data:/data \
              -v /opt/orioneta/caddy-config:/config \
              caddy:2-alpine

            sudo docker exec "${{ env.CADDY_CONTAINER_NAME }}" caddy validate --config /etc/caddy/Caddyfile
            sudo docker exec "${{ env.CONTAINER_NAME }}" wget -qO- http://localhost/health
            sudo docker image prune -f

      - name: Revoke runner SSH access
        if: ${{ always() && steps.runner-ip.outputs.cidr != '' }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port "${{ secrets.EC2_PORT }}" \
            --cidr "${{ steps.runner-ip.outputs.cidr }}" || true
