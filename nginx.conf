map $http_x_forwarded_proto $orioneta_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $orioneta_forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
}

map $http_x_forwarded_port $orioneta_forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://10.0.0.236:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $orioneta_forwarded_host;
        proxy_set_header X-Forwarded-Port $orioneta_forwarded_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $orioneta_forwarded_proto;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass http://10.0.0.236:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $orioneta_forwarded_host;
        proxy_set_header X-Forwarded-Port $orioneta_forwarded_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $orioneta_forwarded_proto;
    }

    location /swagger-ui/ {
        proxy_pass http://10.0.0.236:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $orioneta_forwarded_host;
        proxy_set_header X-Forwarded-Port $orioneta_forwarded_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $orioneta_forwarded_proto;
    }

    location /v3/api-docs {
        proxy_pass http://10.0.0.236:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $orioneta_forwarded_host;
        proxy_set_header X-Forwarded-Port $orioneta_forwarded_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $orioneta_forwarded_proto;
    }

    location /ws/ {
        proxy_pass http://10.0.0.236:8080;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $orioneta_forwarded_host;
        proxy_set_header X-Forwarded-Port $orioneta_forwarded_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $orioneta_forwarded_proto;

        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        image/svg+xml;
}
